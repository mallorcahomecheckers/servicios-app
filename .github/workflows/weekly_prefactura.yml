on:
  schedule:
    # Cada lunes a las 8:00 AM hora española (7:00 UTC en verano, 8:00 UTC en invierno)
    # Usamos 7:00 UTC para que llegue ~8:00 AM en España (horario verano)
    - cron: '0 7 * * 1'
  workflow_dispatch:   # permite ejecutarlo manualmente desde GitHub si hace falta

jobs:
  generar-prefactura:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install firebase-admin reportlab google-auth

      - name: Generar y enviar prefactura semanal
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python scripts/generate_prefactura.py semanal
