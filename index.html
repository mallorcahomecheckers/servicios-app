<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de Servicios</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f13;
    --surface: #16181f;
    --surface2: #1e2029;
    --border: #2a2d38;
    --accent: #c8f04a;
    --accent2: #4af0b8;
    --accent3: #f04a7a;
    --text: #e8eaf0;
    --muted: #6b7080;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* SIDEBAR */
  .layout { display: flex; min-height: 100vh; }

  .sidebar {
    width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 20px;
    color: var(--accent);
    letter-spacing: -0.5px;
    margin-bottom: 24px;
    padding: 0 8px;
  }
  .logo span { color: var(--text); }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: var(--radius);
    cursor: pointer;
    color: var(--muted);
    font-weight: 500;
    transition: all 0.15s;
    border: none;
    background: none;
    font-family: inherit;
    font-size: 14px;
    width: 100%;
    text-align: left;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--accent); color: #0e0f13; }
  .nav-item .icon { font-size: 16px; }

  /* MAIN */
  .main {
    margin-left: 220px;
    flex: 1;
    padding: 32px;
  }

  /* VIEWS */
  .view { display: none; }
  .view.active { display: block; }

  /* PAGE HEADER */
  .page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 28px;
  }
  .page-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 26px;
    letter-spacing: -0.5px;
  }

  /* KPI CARDS */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }
  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .kpi-label {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .kpi-value {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 28px;
    letter-spacing: -1px;
  }
  .kpi-value.green { color: var(--accent); }
  .kpi-value.teal  { color: var(--accent2); }
  .kpi-value.red   { color: var(--accent3); }
  .kpi-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* TABLE */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    background: var(--surface2);
    padding: 12px 14px;
    text-align: left;
    color: var(--muted);
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    white-space: nowrap;
    position: sticky;
    top: 0;
    border-bottom: 1px solid var(--border);
  }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  td {
    padding: 11px 14px;
    white-space: nowrap;
  }

  /* BADGES */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2px;
  }
  .badge-green  { background: rgba(200,240,74,0.15); color: var(--accent); }
  .badge-teal   { background: rgba(74,240,184,0.15); color: var(--accent2); }
  .badge-red    { background: rgba(240,74,122,0.15); color: var(--accent3); }
  .badge-gray   { background: rgba(107,112,128,0.2); color: var(--muted); }
  .badge-yellow { background: rgba(255,200,50,0.15); color: #ffc832; }

  /* CHECK ICONS */
  .check { color: var(--accent); font-size: 15px; }
  .dash  { color: var(--border); font-size: 15px; }

  /* BUTTONS */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 9px 18px;
    border-radius: var(--radius);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: #0e0f13; }
  .btn-primary:hover { opacity: 0.88; }
  .btn-ghost {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--muted); }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn-danger { background: rgba(240,74,122,0.15); color: var(--accent3); border: 1px solid rgba(240,74,122,0.3); }
  .btn-danger:hover { background: rgba(240,74,122,0.25); }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 999;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    width: 680px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    padding: 28px;
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 22px;
  }
  .modal-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 18px;
  }
  .modal-close {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 6px;
    width: 28px; height: 28px;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
  }

  /* FORM */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: var(--muted);
  }
  .form-input, .form-select, .form-textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 9px 12px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    transition: border-color 0.15s;
    width: 100%;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .form-select option { background: var(--surface2); }
  .form-textarea { resize: vertical; min-height: 70px; }

  .section-divider {
    grid-column: 1 / -1;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent);
    padding-top: 6px;
    border-top: 1px solid var(--border);
    margin-top: 4px;
  }

  /* CHECKBOX ROW */
  .checks-row {
    grid-column: 1 / -1;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
  }
  .check-item {
    display: flex;
    align-items: center;
    gap: 7px;
    cursor: pointer;
    user-select: none;
    font-size: 13px;
    color: var(--text);
  }
  .check-item input[type=checkbox] {
    accent-color: var(--accent);
    width: 15px; height: 15px;
    cursor: pointer;
  }

  /* MODAL FOOTER */
  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 22px;
    padding-top: 18px;
    border-top: 1px solid var(--border);
  }

  /* FILTERS */
  .filters {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .filters .form-input { max-width: 220px; }
  .filters .form-select { max-width: 160px; }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 50px;
    color: var(--muted);
  }
  .empty-icon { font-size: 36px; margin-bottom: 10px; }

  /* ACTION BUTTONS IN TABLE */
  .actions { display: flex; gap: 6px; }

  /* TOTALS ROW */
  .total-row td { font-weight: 700; color: var(--accent); background: rgba(200,240,74,0.06); }

  /* RESUMEN */
  .resumen-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-top: 20px;
  }
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .chart-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 16px;
  }
  .bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .bar-label { width: 90px; font-size: 12px; text-align: right; color: var(--muted); }
  .bar-track { flex: 1; height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; background: var(--accent); transition: width 0.5s; }
  .bar-fill.teal { background: var(--accent2); }
  .bar-fill.red  { background: var(--accent3); }
  .bar-val { width: 50px; font-size: 12px; font-weight: 600; }

  .list-stat {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .list-stat:last-child { border: none; }
  .list-stat-name { font-size: 13px; }
  .list-stat-val { font-weight: 600; font-size: 13px; color: var(--accent); }

  .importe-cell { font-weight: 600; font-variant-numeric: tabular-nums; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">servi<span>gestión</span></div>
    <button class="nav-item active" onclick="showView('servicios')">
      <span class="icon">🗂</span> Servicios
    </button>
    <button class="nav-item" onclick="showView('resumen')">
      <span class="icon">📊</span> Resumen
    </button>
    <button class="nav-item" onclick="showView('cobros')">
      <span class="icon">💰</span> Cobros
    </button>
  </aside>

  <main class="main">

    <!-- ===== VIEW: SERVICIOS ===== -->
    <div class="view active" id="view-servicios">
      <div class="page-header">
        <div class="page-title">Servicios</div>
        <button class="btn btn-primary" onclick="openModal()">+ Nuevo servicio</button>
      </div>

      <!-- KPIs -->
      <div class="kpi-grid" id="kpi-grid"></div>

      <!-- FILTERS -->
      <div class="filters">
        <input class="form-input" id="filter-search" placeholder="🔍  Buscar cliente, empleado…" oninput="renderTable()">
        <select class="form-select" id="filter-factura" onchange="renderTable()">
          <option value="">Estado factura</option>
          <option>Facturado</option>
          <option>Pendiente</option>
        </select>
        <select class="form-select" id="filter-cobro" onchange="renderTable()">
          <option value="">Estado cobro</option>
          <option>Cobrado</option>
          <option>Pendiente</option>
        </select>
      </div>

      <!-- TABLE -->
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Empleado</th>
              <th>Cliente</th>
              <th>Propiedad</th>
              <th>Servicios</th>
              <th>Tipo limpieza</th>
              <th>Horas</th>
              <th>Importe</th>
              <th>Factura</th>
              <th>Cobro</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tabla-body"></tbody>
        </table>
      </div>
    </div>

    <!-- ===== VIEW: RESUMEN ===== -->
    <div class="view" id="view-resumen">
      <div class="page-header">
        <div class="page-title">Resumen</div>
      </div>
      <div class="kpi-grid" id="kpi-resumen"></div>
      <div class="resumen-grid" id="resumen-charts"></div>
    </div>

    <!-- ===== VIEW: COBROS ===== -->
    <div class="view" id="view-cobros">
      <div class="page-header">
        <div class="page-title">Gestión de Cobros</div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Cliente</th>
              <th>Propiedad</th>
              <th>Empleado</th>
              <th>Importe</th>
              <th>Factura</th>
              <th>Cobro</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="cobros-body"></tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<!-- ===== MODAL NUEVO SERVICIO ===== -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Nuevo servicio</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-grid">
      <div class="section-divider">Datos generales</div>

      <div class="form-group">
        <label class="form-label">Fecha *</label>
        <input type="date" class="form-input" id="f-fecha">
      </div>
      <div class="form-group">
        <label class="form-label">Empleado *</label>
        <input type="text" class="form-input" id="f-empleado" placeholder="Nombre empleado">
      </div>
      <div class="form-group">
        <label class="form-label">Cliente *</label>
        <input type="text" class="form-input" id="f-cliente" placeholder="Nombre cliente">
      </div>
      <div class="form-group">
        <label class="form-label">Propiedad</label>
        <input type="text" class="form-input" id="f-propiedad" placeholder="Dirección / referencia">
      </div>

      <div class="section-divider">Servicios realizados</div>

      <div class="checks-row">
        <label class="check-item"><input type="checkbox" id="f-bbq"> BBQ</label>
        <label class="check-item"><input type="checkbox" id="f-cristales"> Cristales</label>
        <label class="check-item"><input type="checkbox" id="f-basura"> Basura</label>
        <label class="check-item"><input type="checkbox" id="f-limpieza"> Limpieza</label>
      </div>

      <div class="form-group">
        <label class="form-label">Tipo limpieza</label>
        <select class="form-select" id="f-tipo-limpieza">
          <option value="">— ninguna —</option>
          <option>Normal</option>
          <option>Intermedia</option>
          <option>Profunda</option>
          <option>Check</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Arreglos</label>
        <select class="form-select" id="f-arreglos">
          <option value="">— ninguno —</option>
          <option>Sí</option>
          <option>No</option>
        </select>
      </div>
      <div class="form-group full">
        <label class="form-label">Detalle arreglos</label>
        <input type="text" class="form-input" id="f-detalle-arreglos" placeholder="Descripción">
      </div>
      <div class="form-group">
        <label class="form-label">Servicio extra</label>
        <input type="text" class="form-input" id="f-servicio-extra" placeholder="Tipo servicio extra">
      </div>
      <div class="form-group">
        <label class="form-label">Detalle extra</label>
        <input type="text" class="form-input" id="f-detalle-extra" placeholder="Descripción">
      </div>

      <div class="section-divider">Facturación</div>

      <div class="form-group">
        <label class="form-label">Horas</label>
        <input type="number" class="form-input" id="f-horas" min="0" step="0.5" placeholder="0" oninput="calcularImporte()">
      </div>
      <div class="form-group">
        <label class="form-label">Tarifa/hora (€)</label>
        <input type="number" class="form-input" id="f-tarifa" min="0" step="0.01" placeholder="0.00" oninput="calcularImporte()">
      </div>
      <div class="form-group">
        <label class="form-label">Precio cerrado (€)</label>
        <input type="number" class="form-input" id="f-precio-cerrado" min="0" step="0.01" placeholder="0.00" oninput="calcularImporte()">
      </div>
      <div class="form-group">
        <label class="form-label">Importe total (€)</label>
        <input type="number" class="form-input" id="f-importe" min="0" step="0.01" placeholder="0.00" readonly style="opacity:0.6">
      </div>
      <div class="form-group">
        <label class="form-label">Estado factura</label>
        <select class="form-select" id="f-estado-factura">
          <option>Pendiente</option>
          <option>Facturado</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Estado cobro</label>
        <select class="form-select" id="f-estado-cobro">
          <option>Pendiente</option>
          <option>Cobrado</option>
        </select>
      </div>
      <div class="form-group full">
        <label class="form-label">Observaciones</label>
        <textarea class="form-textarea" id="f-observaciones" placeholder="Notas adicionales…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarServicio()">Guardar servicio</button>
    </div>
  </div>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
let servicios = JSON.parse(localStorage.getItem('serv_app') || '[]');
let editIndex = -1;

// Demo data if empty
if (servicios.length === 0) {
  servicios = [
    { fecha:'2025-03-01', empleado:'María García', cliente:'Casa Sol', propiedad:'Calle Mayor 10', bbq:false, cristales:true, basura:true, limpieza:true, tipoLimpieza:'Normal', arreglos:'No', detalleArreglos:'', servicioExtra:'', detalleExtra:'', horas:3, tarifa:15, precioCerrado:0, importe:45, estadoFactura:'Facturado', estadoCobro:'Cobrado', observaciones:'' },
    { fecha:'2025-03-05', empleado:'Pedro López', cliente:'Villa Azul', propiedad:'Av. Mediterráneo 34', bbq:true, cristales:false, basura:true, limpieza:true, tipoLimpieza:'Profunda', arreglos:'Sí', detalleArreglos:'Grifo roto baño', servicioExtra:'', detalleExtra:'', horas:5, tarifa:15, precioCerrado:0, importe:75, estadoFactura:'Facturado', estadoCobro:'Pendiente', observaciones:'Cliente pide factura detallada' },
    { fecha:'2025-03-08', empleado:'María García', cliente:'Piso Centro', propiedad:'Plaza España 2, 3B', bbq:false, cristales:false, basura:false, limpieza:true, tipoLimpieza:'Intermedia', arreglos:'No', detalleArreglos:'', servicioExtra:'Plancha', detalleExtra:'Sábanas y manteles', horas:0, tarifa:0, precioCerrado:120, importe:120, estadoFactura:'Pendiente', estadoCobro:'Pendiente', observaciones:'' },
    { fecha:'2025-03-10', empleado:'Ana Martínez', cliente:'Casa Sol', propiedad:'Calle Mayor 10', bbq:false, cristales:true, basura:true, limpieza:true, tipoLimpieza:'Check', arreglos:'No', detalleArreglos:'', servicioExtra:'', detalleExtra:'', horas:2, tarifa:15, precioCerrado:0, importe:30, estadoFactura:'Pendiente', estadoCobro:'Pendiente', observaciones:'' },
    { fecha:'2025-03-12', empleado:'Pedro López', cliente:'Apto Playa', propiedad:'Paseo Marítimo 7, 1A', bbq:true, cristales:true, basura:true, limpieza:true, tipoLimpieza:'Normal', arreglos:'Sí', detalleArreglos:'Pintura terraza', servicioExtra:'Jardinería', detalleExtra:'Riego plantas', horas:6, tarifa:18, precioCerrado:0, importe:108, estadoFactura:'Facturado', estadoCobro:'Cobrado', observaciones:'' },
  ];
  save();
}

function save() {
  localStorage.setItem('serv_app', JSON.stringify(servicios));
}

// ─── NAV ─────────────────────────────────────────────────────────────────────
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  event.currentTarget.classList.add('active');
  if (name === 'resumen') renderResumen();
  if (name === 'cobros') renderCobros();
  if (name === 'servicios') renderKPIs();
}

// ─── KPIs ─────────────────────────────────────────────────────────────────────
function renderKPIs() {
  const total = servicios.length;
  const totalImporte = servicios.reduce((s,x) => s + (x.importe||0), 0);
  const cobrado = servicios.filter(x => x.estadoCobro === 'Cobrado').reduce((s,x) => s + (x.importe||0), 0);
  const pendiente = totalImporte - cobrado;
  const grid = document.getElementById('kpi-grid');
  grid.innerHTML = `
    <div class="kpi-card">
      <div class="kpi-label">Total servicios</div>
      <div class="kpi-value">${total}</div>
      <div class="kpi-sub">registros</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Facturado total</div>
      <div class="kpi-value green">${fmt(totalImporte)}</div>
      <div class="kpi-sub">importe acumulado</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Cobrado</div>
      <div class="kpi-value teal">${fmt(cobrado)}</div>
      <div class="kpi-sub">recibido</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Pendiente cobro</div>
      <div class="kpi-value red">${fmt(pendiente)}</div>
      <div class="kpi-sub">por cobrar</div>
    </div>
  `;
}

// ─── TABLE ────────────────────────────────────────────────────────────────────
function renderTable() {
  const search = document.getElementById('filter-search').value.toLowerCase();
  const filtFact = document.getElementById('filter-factura').value;
  const filtCobro = document.getElementById('filter-cobro').value;

  let data = servicios.filter((s, i) => {
    s._idx = i;
    const text = (s.cliente + s.empleado + s.propiedad).toLowerCase();
    return (!search || text.includes(search))
      && (!filtFact || s.estadoFactura === filtFact)
      && (!filtCobro || s.estadoCobro === filtCobro);
  });

  const tbody = document.getElementById('tabla-body');
  if (data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="11"><div class="empty"><div class="empty-icon">📋</div>Sin resultados</div></td></tr>';
    return;
  }

  tbody.innerHTML = data.map(s => `
    <tr>
      <td>${fmtDate(s.fecha)}</td>
      <td>${s.empleado}</td>
      <td><strong>${s.cliente}</strong></td>
      <td style="color:var(--muted)">${s.propiedad}</td>
      <td>${serviciosIcons(s)}</td>
      <td>${s.tipoLimpieza ? `<span class="badge badge-gray">${s.tipoLimpieza}</span>` : '—'}</td>
      <td>${s.horas ? s.horas + 'h' : '—'}</td>
      <td class="importe-cell">${fmt(s.importe)}</td>
      <td>${badgeFact(s.estadoFactura)}</td>
      <td>${badgeCobro(s.estadoCobro)}</td>
      <td>
        <div class="actions">
          <button class="btn btn-ghost btn-sm" onclick="editarServicio(${s._idx})">✏️</button>
          <button class="btn btn-danger btn-sm" onclick="eliminar(${s._idx})">🗑</button>
        </div>
      </td>
    </tr>
  `).join('');

  renderKPIs();
}

function serviciosIcons(s) {
  let out = '';
  if (s.bbq) out += '<span title="BBQ">🔥</span> ';
  if (s.cristales) out += '<span title="Cristales">🪟</span> ';
  if (s.basura) out += '<span title="Basura">🗑</span> ';
  if (s.limpieza) out += '<span title="Limpieza">🧹</span> ';
  if (s.servicioExtra) out += `<span title="Extra: ${s.servicioExtra}">⭐</span> `;
  return out || '<span style="color:var(--muted)">—</span>';
}

function badgeFact(v) {
  if (v === 'Facturado') return `<span class="badge badge-green">✓ Facturado</span>`;
  return `<span class="badge badge-yellow">⏳ Pendiente</span>`;
}
function badgeCobro(v) {
  if (v === 'Cobrado') return `<span class="badge badge-teal">✓ Cobrado</span>`;
  return `<span class="badge badge-red">⏳ Pendiente</span>`;
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function openModal(idx = -1) {
  editIndex = idx;
  const modal = document.getElementById('modal-overlay');
  const title = document.getElementById('modal-title');

  if (idx === -1) {
    title.textContent = 'Nuevo servicio';
    clearForm();
    document.getElementById('f-fecha').value = new Date().toISOString().slice(0,10);
  } else {
    title.textContent = 'Editar servicio';
    fillForm(servicios[idx]);
  }
  modal.classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  editIndex = -1;
}

function clearForm() {
  ['f-fecha','f-empleado','f-cliente','f-propiedad','f-detalle-arreglos','f-servicio-extra','f-detalle-extra','f-horas','f-tarifa','f-precio-cerrado','f-importe','f-observaciones'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  ['f-bbq','f-cristales','f-basura','f-limpieza'].forEach(id => document.getElementById(id).checked = false);
  document.getElementById('f-tipo-limpieza').value = '';
  document.getElementById('f-arreglos').value = '';
  document.getElementById('f-estado-factura').value = 'Pendiente';
  document.getElementById('f-estado-cobro').value = 'Pendiente';
}

function fillForm(s) {
  document.getElementById('f-fecha').value = s.fecha || '';
  document.getElementById('f-empleado').value = s.empleado || '';
  document.getElementById('f-cliente').value = s.cliente || '';
  document.getElementById('f-propiedad').value = s.propiedad || '';
  document.getElementById('f-bbq').checked = !!s.bbq;
  document.getElementById('f-cristales').checked = !!s.cristales;
  document.getElementById('f-basura').checked = !!s.basura;
  document.getElementById('f-limpieza').checked = !!s.limpieza;
  document.getElementById('f-tipo-limpieza').value = s.tipoLimpieza || '';
  document.getElementById('f-arreglos').value = s.arreglos || '';
  document.getElementById('f-detalle-arreglos').value = s.detalleArreglos || '';
  document.getElementById('f-servicio-extra').value = s.servicioExtra || '';
  document.getElementById('f-detalle-extra').value = s.detalleExtra || '';
  document.getElementById('f-horas').value = s.horas || '';
  document.getElementById('f-tarifa').value = s.tarifa || '';
  document.getElementById('f-precio-cerrado').value = s.precioCerrado || '';
  document.getElementById('f-importe').value = s.importe || '';
  document.getElementById('f-estado-factura').value = s.estadoFactura || 'Pendiente';
  document.getElementById('f-estado-cobro').value = s.estadoCobro || 'Pendiente';
  document.getElementById('f-observaciones').value = s.observaciones || '';
}

function calcularImporte() {
  const horas = parseFloat(document.getElementById('f-horas').value) || 0;
  const tarifa = parseFloat(document.getElementById('f-tarifa').value) || 0;
  const cerrado = parseFloat(document.getElementById('f-precio-cerrado').value) || 0;
  const importe = cerrado > 0 ? cerrado : horas * tarifa;
  document.getElementById('f-importe').value = importe > 0 ? importe.toFixed(2) : '';
}

function guardarServicio() {
  const cliente = document.getElementById('f-cliente').value.trim();
  const empleado = document.getElementById('f-empleado').value.trim();
  if (!cliente || !empleado) { alert('Cliente y empleado son obligatorios.'); return; }

  const obj = {
    fecha: document.getElementById('f-fecha').value,
    empleado,
    cliente,
    propiedad: document.getElementById('f-propiedad').value.trim(),
    bbq: document.getElementById('f-bbq').checked,
    cristales: document.getElementById('f-cristales').checked,
    basura: document.getElementById('f-basura').checked,
    limpieza: document.getElementById('f-limpieza').checked,
    tipoLimpieza: document.getElementById('f-tipo-limpieza').value,
    arreglos: document.getElementById('f-arreglos').value,
    detalleArreglos: document.getElementById('f-detalle-arreglos').value.trim(),
    servicioExtra: document.getElementById('f-servicio-extra').value.trim(),
    detalleExtra: document.getElementById('f-detalle-extra').value.trim(),
    horas: parseFloat(document.getElementById('f-horas').value) || 0,
    tarifa: parseFloat(document.getElementById('f-tarifa').value) || 0,
    precioCerrado: parseFloat(document.getElementById('f-precio-cerrado').value) || 0,
    importe: parseFloat(document.getElementById('f-importe').value) || 0,
    estadoFactura: document.getElementById('f-estado-factura').value,
    estadoCobro: document.getElementById('f-estado-cobro').value,
    observaciones: document.getElementById('f-observaciones').value.trim(),
  };

  if (editIndex === -1) {
    servicios.push(obj);
  } else {
    servicios[editIndex] = obj;
    editIndex = -1;
  }
  save();
  closeModal();
  renderTable();
}

function editarServicio(idx) { openModal(idx); }

function eliminar(idx) {
  if (!confirm('¿Eliminar este servicio?')) return;
  servicios.splice(idx, 1);
  save();
  renderTable();
}

// ─── RESUMEN ──────────────────────────────────────────────────────────────────
function renderResumen() {
  const total = servicios.length;
  const totalImporte = servicios.reduce((s,x) => s + (x.importe||0), 0);
  const cobrado = servicios.filter(x => x.estadoCobro === 'Cobrado').reduce((s,x) => s + (x.importe||0), 0);
  const pendiente = totalImporte - cobrado;

  document.getElementById('kpi-resumen').innerHTML = `
    <div class="kpi-card"><div class="kpi-label">Servicios</div><div class="kpi-value">${total}</div></div>
    <div class="kpi-card"><div class="kpi-label">Facturado</div><div class="kpi-value green">${fmt(totalImporte)}</div></div>
    <div class="kpi-card"><div class="kpi-label">Cobrado</div><div class="kpi-value teal">${fmt(cobrado)}</div></div>
    <div class="kpi-card"><div class="kpi-label">Pendiente</div><div class="kpi-value red">${fmt(pendiente)}</div></div>
  `;

  // Por empleado
  const byEmpleado = {};
  servicios.forEach(s => {
    byEmpleado[s.empleado] = (byEmpleado[s.empleado] || 0) + (s.importe||0);
  });
  const maxEmp = Math.max(...Object.values(byEmpleado), 1);
  const empHTML = Object.entries(byEmpleado).sort((a,b)=>b[1]-a[1]).map(([n,v]) => `
    <div class="bar-row">
      <div class="bar-label">${n.split(' ')[0]}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(v/maxEmp*100).toFixed(0)}%"></div></div>
      <div class="bar-val">${fmt(v)}</div>
    </div>
  `).join('');

  // Por cliente
  const byCliente = {};
  servicios.forEach(s => {
    byCliente[s.cliente] = (byCliente[s.cliente] || 0) + (s.importe||0);
  });
  const cliHTML = Object.entries(byCliente).sort((a,b)=>b[1]-a[1]).map(([n,v]) => `
    <div class="list-stat"><span class="list-stat-name">${n}</span><span class="list-stat-val">${fmt(v)}</span></div>
  `).join('');

  // Tipos limpieza
  const byTipo = {};
  servicios.forEach(s => { if (s.tipoLimpieza) byTipo[s.tipoLimpieza] = (byTipo[s.tipoLimpieza] || 0) + 1; });
  const maxTipo = Math.max(...Object.values(byTipo), 1);
  const tipoHTML = Object.entries(byTipo).sort((a,b)=>b[1]-a[1]).map(([n,v]) => `
    <div class="bar-row">
      <div class="bar-label">${n}</div>
      <div class="bar-track"><div class="bar-fill teal" style="width:${(v/maxTipo*100).toFixed(0)}%"></div></div>
      <div class="bar-val">${v} serv.</div>
    </div>
  `).join('');

  document.getElementById('resumen-charts').innerHTML = `
    <div class="chart-card">
      <div class="chart-title">Importe por empleado</div>
      ${empHTML || '<div class="empty">Sin datos</div>'}
    </div>
    <div class="chart-card">
      <div class="chart-title">Facturación por cliente</div>
      ${cliHTML || '<div class="empty">Sin datos</div>'}
    </div>
    <div class="chart-card">
      <div class="chart-title">Tipos de limpieza</div>
      ${tipoHTML || '<div class="empty">Sin datos</div>'}
    </div>
    <div class="chart-card">
      <div class="chart-title">Estado cobros</div>
      <div class="list-stat"><span>Cobrado</span><span class="list-stat-val" style="color:var(--accent2)">${servicios.filter(x=>x.estadoCobro==='Cobrado').length} (${fmt(cobrado)})</span></div>
      <div class="list-stat"><span>Pendiente</span><span class="list-stat-val" style="color:var(--accent3)">${servicios.filter(x=>x.estadoCobro==='Pendiente').length} (${fmt(pendiente)})</span></div>
      <div class="list-stat"><span>Facturado</span><span class="list-stat-val">${servicios.filter(x=>x.estadoFactura==='Facturado').length} serv.</span></div>
      <div class="list-stat"><span>Sin facturar</span><span class="list-stat-val" style="color:var(--accent3)">${servicios.filter(x=>x.estadoFactura==='Pendiente').length} serv.</span></div>
    </div>
  `;
}

// ─── COBROS ───────────────────────────────────────────────────────────────────
function renderCobros() {
  const tbody = document.getElementById('cobros-body');
  const sorted = [...servicios].map((s,i) => ({...s, _idx:i})).sort((a,b) => a.estadoCobro.localeCompare(b.estadoCobro));
  tbody.innerHTML = sorted.map(s => `
    <tr>
      <td>${fmtDate(s.fecha)}</td>
      <td><strong>${s.cliente}</strong></td>
      <td style="color:var(--muted)">${s.propiedad}</td>
      <td>${s.empleado}</td>
      <td class="importe-cell">${fmt(s.importe)}</td>
      <td>${badgeFact(s.estadoFactura)}</td>
      <td>${badgeCobro(s.estadoCobro)}</td>
      <td>
        <div class="actions">
          ${s.estadoCobro === 'Pendiente' ? `<button class="btn btn-ghost btn-sm" onclick="marcarCobrado(${s._idx})">✓ Cobrado</button>` : ''}
          ${s.estadoFactura === 'Pendiente' ? `<button class="btn btn-ghost btn-sm" onclick="marcarFacturado(${s._idx})">📄 Facturar</button>` : ''}
        </div>
      </td>
    </tr>
  `).join('');
}

function marcarCobrado(idx) {
  servicios[idx].estadoCobro = 'Cobrado';
  save(); renderCobros();
}
function marcarFacturado(idx) {
  servicios[idx].estadoFactura = 'Facturado';
  save(); renderCobros();
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function fmt(n) {
  if (!n && n !== 0) return '—';
  return new Intl.NumberFormat('es-ES', { style:'currency', currency:'EUR' }).format(n);
}
function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('es-ES', { day:'2-digit', month:'short', year:'numeric' });
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderTable();
renderKPIs();
</script>
</body>
</html>
